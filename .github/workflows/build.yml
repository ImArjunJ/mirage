name: build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: clang++-18
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang-18 libc++-18-dev libc++abi-18-dev libssl-dev libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libvulkan-dev glslc libx11-dev libva-dev
      - name: cache vcpkg (windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-x64-windows-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: vcpkg-x64-windows-
      - name: install deps (windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install openssl:x64-windows ffmpeg:x64-windows vulkan:x64-windows shaderc:x64-windows
      - name: build (linux)
        if: runner.os == 'Linux'
        run: |
          export CXXFLAGS="-stdlib=libc++"
          export LDFLAGS="-stdlib=libc++ -lc++abi"
          cmake -B build -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
      - name: build (windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
      - name: verify (linux)
        if: runner.os == 'Linux'
        run: ./build/mirage --version
      - name: verify (windows)
        if: runner.os == 'Windows'
        run: ./build/Release/mirage.exe --version
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirage-${{ runner.os }}
          path: |
            build/mirage
            build/Release/mirage.exe
          if-no-files-found: ignore
