name: build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: clang++-18
          - os: windows-latest
            compiler: cl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: install deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang-18 libc++-18-dev libc++abi-18-dev libssl-dev libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libvulkan-dev glslc libx11-dev libva-dev
      - name: cache vcpkg (windows)
        id: cache-vcpkg
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ github.workspace }}/.vcpkg-binary-cache
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-
      - name: install deps (windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        timeout-minutes: 90
        run: |
          .\.github\scripts\install-vcpkg-windows.ps1 -Triplet x64-windows
      - name: build (linux)
        if: runner.os == 'Linux'
        run: |
          export CXXFLAGS="-stdlib=libc++"
          export LDFLAGS="-stdlib=libc++ -lc++abi"
          cmake -B build -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
          cmake --build build -j$(nproc)
      - name: build (windows)
        if: runner.os == 'Windows'
        timeout-minutes: 20
        run: |
          $cache = Join-Path $env:GITHUB_WORKSPACE ".vcpkg-binary-cache"
          $installed = Join-Path $env:GITHUB_WORKSPACE "vcpkg_installed"
          $env:VCPKG_BINARY_SOURCES = "clear;files,$cache,readwrite"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON "-DVCPKG_MANIFEST_INSTALL=OFF" "-DVCPKG_INSTALLED_DIR=$installed" "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS
      - name: verify (linux)
        if: runner.os == 'Linux'
        run: |
          ./build/mirage --version
          ./build/mirage paths
          ./build/mirage doctor --no-mdns
          ./build/mirage status
          ctest --test-dir build --output-on-failure
          cmake --install build --prefix install-smoke
          test -x install-smoke/bin/mirage
          test -f install-smoke/share/mirage/shaders/nv12_to_rgb.vert.spv
          test -f install-smoke/share/mirage/shaders/nv12_to_rgb.frag.spv
      - name: verify (windows)
        if: runner.os == 'Windows'
        run: |
          ./build/Release/mirage.exe --version
          ./build/Release/mirage.exe paths
          ./build/Release/mirage.exe doctor --no-mdns
          ./build/Release/mirage.exe status
          ctest --test-dir build -C Release --output-on-failure
          cmake --install build --config Release --prefix install-smoke
          if (!(Test-Path install-smoke/bin/mirage.exe)) { throw "installed mirage.exe missing" }
          if (!(Test-Path install-smoke/share/mirage/shaders/nv12_to_rgb.vert.spv)) { throw "installed vertex shader missing" }
          if (!(Test-Path install-smoke/share/mirage/shaders/nv12_to_rgb.frag.spv)) { throw "installed fragment shader missing" }
      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mirage-${{ runner.os }}
          path: |
            build/mirage
            build/Release/mirage.exe
          if-no-files-found: ignore
