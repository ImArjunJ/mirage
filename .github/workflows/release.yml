name: release
on:
  push:
    tags: ['v*']
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: clang++-18
            artifact: linux-x86_64
          - os: windows-latest
            compiler: cl
            artifact: windows-x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: install deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang-18 libc++-18-dev libc++abi-18-dev libssl-dev libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libvulkan-dev glslc libx11-dev libva-dev
      - name: locate vcpkg revision (windows)
        id: vcpkg-rev
        if: runner.os == 'Windows'
        run: |
          $rev = git -C "$env:VCPKG_INSTALLATION_ROOT" rev-parse HEAD
          "rev=$rev" >> $env:GITHUB_OUTPUT
      - name: cache vcpkg (windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ github.workspace }}/.vcpkg-binary-cache
          key: vcpkg-x64-windows-${{ steps.vcpkg-rev.outputs.rev }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-${{ steps.vcpkg-rev.outputs.rev }}-
      - name: install deps (windows)
        if: runner.os == 'Windows'
        timeout-minutes: 90
        run: |
          .\.github\scripts\install-vcpkg-windows.ps1 -Triplet x64-windows
      - name: build (linux)
        if: runner.os == 'Linux'
        run: |
          export CXXFLAGS="-stdlib=libc++"
          export LDFLAGS="-stdlib=libc++ -lc++abi"
          cmake -B build -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build --target mirage -j$(nproc)
      - name: build (windows)
        if: runner.os == 'Windows'
        timeout-minutes: 20
        run: |
          $cache = Join-Path $env:GITHUB_WORKSPACE ".vcpkg-binary-cache"
          $installed = Join-Path $env:GITHUB_WORKSPACE "vcpkg_installed"
          $env:VCPKG_BINARY_SOURCES = "clear;files,$cache,readwrite"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF "-DVCPKG_MANIFEST_INSTALL=OFF" "-DVCPKG_INSTALLED_DIR=$installed" "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release --target mirage --parallel $env:NUMBER_OF_PROCESSORS
      - name: package (linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p mirage-${{ github.ref_name }}-${{ matrix.artifact }}
          mkdir -p mirage-${{ github.ref_name }}-${{ matrix.artifact }}/shaders
          cp build/mirage README.md LICENSE mirage-${{ github.ref_name }}-${{ matrix.artifact }}/
          cp build/shaders/*.spv mirage-${{ github.ref_name }}-${{ matrix.artifact }}/shaders/
          zip -r mirage-${{ github.ref_name }}-${{ matrix.artifact }}.zip mirage-${{ github.ref_name }}-${{ matrix.artifact }}/
      - name: package (windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Path mirage-${{ github.ref_name }}-${{ matrix.artifact }}
          New-Item -ItemType Directory -Path mirage-${{ github.ref_name }}-${{ matrix.artifact }}/shaders
          Copy-Item build/Release/mirage.exe, README.md, LICENSE mirage-${{ github.ref_name }}-${{ matrix.artifact }}/
          Copy-Item build/shaders/*.spv mirage-${{ github.ref_name }}-${{ matrix.artifact }}/shaders/
          Compress-Archive -Path mirage-${{ github.ref_name }}-${{ matrix.artifact }}/* -DestinationPath mirage-${{ github.ref_name }}-${{ matrix.artifact }}.zip
      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mirage-${{ matrix.artifact }}
          path: mirage-${{ github.ref_name }}-${{ matrix.artifact }}.zip
  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: mirage-*.zip
